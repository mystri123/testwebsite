<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Happy Birthday ❤️</title>

    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap"
          rel="stylesheet">

    <!-- Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

</head>

<body>

    <!-- Background -->
    <div class="background"></div>

    <!-- Countdown Screen -->
    <div id="countdownScreen" class="screen">

        <h2>Something Special is Waiting ❤️</h2>

        <div id="countdown">

            <span id="days">00</span>d
            <span id="hours">00</span>h
            <span id="minutes">00</span>m
            <span id="seconds">00</span>s

        </div>

        <p>Until your birthday 🎂</p>

    </div>

    <!-- Heart -->
    <div id="heartContainer" class="hidden">

        <div id="heart">
            ❤️
        </div>

    </div>

    <!-- Cake -->
    <div id="cakeContainer" class="hidden">

        <!-- NEW PHOTOS -->
        <img id="leftPhoto" class="sidePhoto hidden" src="images/pic1.jpeg" alt="Left Memory">
        <img id="rightPhoto" class="sidePhoto hidden" src="images/pic2.jpeg" alt="Right Memory">

        <div id="cake">
            🎂
        </div>

        <h1 id="wish">
            Happy Birthday 😘😘
        </h1>

        <button id="continueBtn">
            Continue →
        </button>

    </div>
    

    <!-- Letter Screen -->
    <!-- <div id="letterScreen" class="hidden">

        <div class="letter">

            <h1>To My Love ❤️</h1>

            <p id="letterText"></p>

        </div>

    </div> -->

    <!-- Music -->
    <audio
        id="birthdayMusic"
        src="birthday.mp3"
        preload="auto">
    </audio>

    <script src="script.js"></script>

</body>

</html>
